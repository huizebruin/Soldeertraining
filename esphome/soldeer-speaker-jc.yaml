# Board: DOIT ESP32 DEVKIT V1 (DOIT)
# Definition: definitions/boards/esp32doit-devkit-v1/manifest.yaml

esphome:
  name: soldeer-speaker-jc
  friendly_name: soldeer-speaker-jc
# on_boot: switch naar het status-scherm zodra wifi/api opgestart is
  on_boot:
    priority: -100
    then:
      - display.page.show: main_page
      - component.update: oled_display
esp32:
  variant: esp32
  flash_size: 4MB
  framework:
    type: esp-idf
    advanced:
      sram1_as_iram: true


logger:

api:
  encryption:
    key: "="

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: soldeer-speaker Fallback Hotspot
    


captive_portal:
 
# ---------------------------------------------------------------------------
# Status / display
# ---------------------------------------------------------------------------

globals:
  - id: last_button
    type: std::string
    initial_value: '"-"'

i2c:
  sda: GPIO33
  scl: GPIO32
  scan: true
  id: i2c_bus

font:
  - file: "fonts/Arial.ttf"
    id: font_small
    size: 12

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    rotation: 0
    id: oled_display
    pages:
      - id: boot_page
        lambda: |-
          it.fill(COLOR_OFF);
          it.print(0, 0, id(font_small), "Soldeer Speaker");
          it.print(0, 14, id(font_small), "Starting up...");
          it.print(0, 28, id(font_small), "v2.0 - ESPHome");
      - id: main_page
        lambda: |-
          it.fill(COLOR_OFF);
          it.print(0, 0, id(font_small), "Soldeer Speaker");
          it.printf(0, 14, id(font_small), "Vol: %.0f%%", id(soldeer_media_player).volume * 100.0f);
          std::string state = "-";
          switch (id(soldeer_media_player).state) {
            case media_player::MEDIA_PLAYER_STATE_PLAYING: state = "Playing"; break;
            case media_player::MEDIA_PLAYER_STATE_PAUSED: state = "Paused"; break;
            case media_player::MEDIA_PLAYER_STATE_IDLE: state = "Idle"; break;
            default: state = "-"; break;
          }
          it.printf(0, 28, id(font_small), "Status: %s", state.c_str());
          it.print(0, 44, id(font_small), "Knop:");
          it.print(40, 44, id(font_small), id(last_button).c_str());



# ---------------------------------------------------------------------------
# Audio: I2S -> PCM5122 DAC -> media_player
# ---------------------------------------------------------------------------

i2s_audio:
  - id: i2s_output
    i2s_lrclk_pin: GPIO25
    i2s_bclk_pin: GPIO26

audio_dac:
  - platform: pcm5122
    i2c_id: i2c_bus
    id: pcm5122_dac
    address: 0x4C

speaker:
  # De fysieke I2S/DAC uitgang
  - platform: i2s_audio
    id: i2s_speaker
    i2s_audio_id: i2s_output
    i2s_dout_pin: GPIO27
    dac_type: external
    audio_dac: pcm5122_dac

  # Eén mixer die naar de fysieke speaker uitstuurt, met twee virtuele
  # bron-ingangen: media_mixing_input (radiostream) en
  # announcement_mixing_input (korte meldingen/TTS). Deze twee ID's worden
  # hier gedeclareerd, niet elders — dat is precies wat de mixer-speaker
  # ("source_speakers") verwacht.
  - platform: mixer
    id: audio_mixer
    output_speaker: i2s_speaker
    source_speakers:
      - id: media_mixing_input
      - id: announcement_mixing_input

media_player:
  - platform: speaker
    id: soldeer_media_player
    name: "Soldeer Speaker"
    media_pipeline:
      speaker: media_mixing_input
    announcement_pipeline:
      speaker: announcement_mixing_input

# ---------------------------------------------------------------------------
# Versterker aan/uit
# ---------------------------------------------------------------------------
# Let op: er stonden in je oude config TWEE "amplifier enable" schakelaars
# (één op een GPIO-pin van de PCM5122 zelf, één op ESP32 GPIO18). Ik laat ze
# allebei staan zodat je hardware blijft werken zoals bedraad, maar check of
# je ze allebei echt nodig hebt — vaak is er maar één enable-lijn naar de
# eindversterker.

switch:
  - platform: gpio
    name: "Amplifier Enable (DAC pin)"
    pin:
      pcm5122: pcm5122_dac
      number: 4
      mode:
        output: true
    restore_mode: RESTORE_DEFAULT_ON

  - platform: gpio
    id: amplifier_enable
    name: "Amplifier Enable (GPIO18)"
    pin:
      number: GPIO18
    restore_mode: RESTORE_DEFAULT_ON

# ---------------------------------------------------------------------------
# Knoppen — nu met echte functie i.p.v. alleen tekst op het scherm
# ---------------------------------------------------------------------------
# Beneden = volume omlaag
# Boven   = volume omhoog
# Midden  = play/pause toggle
# Links   = vorig station (event naar HA, HA kiest de stream-URL)
# Rechts  = volgend station (event naar HA, HA kiest de stream-URL)

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO4
      inverted: false
    name: "Tip toets Beneden"
    filters:
      - delayed_off: 10ms
    on_press:
      - globals.set:
          id: last_button
          value: '"Beneden (vol-)"'
      - media_player.volume_down: soldeer_media_player
    icon: "mdi:volume-minus"

  - platform: gpio
    pin:
      number: GPIO15
      inverted: false
    name: "Tip toets Boven"
    filters:
      - delayed_off: 10ms
    on_press:
      - globals.set:
          id: last_button
          value: '"Boven (vol+)"'
      - media_player.volume_up: soldeer_media_player
    icon: "mdi:volume-plus"

  - platform: gpio
    pin:
      number: GPIO13
      inverted: false
    name: "Tip toets Midden"
    filters:
      - delayed_off: 10ms
    on_press:
      - globals.set:
          id: last_button
          value: '"Midden (play/pause)"'
      - media_player.toggle: soldeer_media_player
    icon: "mdi:play-pause"

  - platform: gpio
    pin:
      number: GPIO14
      inverted: false
    name: "Tip toets Links"
    filters:
      - delayed_off: 10ms
    on_press:
      - globals.set:
          id: last_button
          value: '"Links (vorige)"'
      - homeassistant.event:
          event: esphome.soldeer_speaker_previous_station
    icon: "mdi:skip-previous"

  - platform: gpio
    pin:
      number: GPIO12
      inverted: false
    name: "Tip toets Rechts"
    filters:
      - delayed_off: 10ms
    on_press:
      - globals.set:
          id: last_button
          value: '"Rechts (volgende)"'
      - homeassistant.event:
          event: esphome.soldeer_speaker_next_station
    icon: "mdi:skip-next"

text_sensor:
  - platform: template
    name: "Radio Last Button"
    id: radio_last_button_text
    lambda: |-
      return { id(last_button).c_str() };