# Board: DOIT ESP32 DEVKIT V1 (DOIT)
# Definition: definitions/boards/esp32doit-devkit-v1/manifest.yaml

esphome:
  name: soldeer-speaker-jc
  friendly_name: soldeer-speaker-jc

esp32:
  variant: esp32
  flash_size: 4MB
  framework:
    type: esp-idf

logger:

api:
  encryption:
    

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: soldeer-speaker Fallback Hotspot

captive_portal:

i2c:
  sda: GPIO33
  scl: GPIO32
  scan: true
  id: i2c_bus

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    rotation: 0
    lambda: |-
      it.print(0, 0, id(font_small), "ESPHome");
      it.print(0, 15, id(font_small), "JC speler");
      // voeg status/streamnaam etc. dynamisch toe

font:
  - file: "fonts/Arial.ttf"
    id: font_small
    size: 12
  - id: font_1
    file:
      type: gfonts
      family: Roboto

  
  
i2s_audio:
  - id: i2s_output
    i2s_lrclk_pin: GPIO25
    i2s_bclk_pin: GPIO26

audio_dac:
  - platform: pcm5122
    i2c_id: i2c_bus
    id: pcm5122_dac
    address: 0x4C


speaker:
  - platform: i2s_audio
    i2s_audio_id: i2s_output
    id: speaker_id
    i2s_dout_pin: GPIO27
    dac_type: external
    audio_dac: pcm5122_dac

# Use PCM5122 GPIO4 to control an external amplifier enable pin
switch:
  - platform: gpio
    name: "Amplifier Enable"
    pin:
      pcm5122: pcm5122_dac
      number: 4
      mode:
        output: true
    restore_mode: RESTORE_DEFAULT_ON
    
